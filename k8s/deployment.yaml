apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
  labels: { app: ecommerce }
spec:
  replicas: 2
  selector: { matchLabels: { app: ecommerce } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata: { labels: { app: ecommerce } }
    spec:
      containers:
        - name: ecommerce
          image: 986552987314.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-app:latest
          ports: [{ containerPort: 3000 }]
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "250m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
